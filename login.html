<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="node_modules/bootstrap/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="node_modules/bootstrap-icons/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="node_modules/vazirmatn/misc/Farsi-Digits/Vazirmatn-FD-font-face.css">
    <script src="node_modules/bootstrap/dist/js/bootstrap.bundle.js"></script>
</head>
<body>
    <!-- Button trigger modal -->
<button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#staticBackdrop">
    <i class="bi bi-box-arrow-in-right"></i> <span>Login</span>
  </button>
  
  <!-- Modal -->
  <div class="modal fade" id="staticBackdrop" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1" aria-labelledby="staticBackdropLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
            <div>
                <img src="images/img_avatar2.png" alt="" srcset="" class="w-25 d-block rounded-circle ">
            </div>
            <!-- <div>
                <h1 class=" fs-5" id="staticBackdropLabel">Login</h1>
            </div> -->
          
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
            <h1 class="h3 text-center">Login</h1>
            <form>
                <div class="mb-3">
                  <label for="exampleInputEmail1" class="form-label">Username</label>
                  <input type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp" placeholder="Enter Usernsme">
                  <div id="emailHelp" class="form-text">We'll never share your Username with anyone else.</div>
                </div>
                <div class="mb-3">
                  <label for="exampleInputPassword1" class="form-label">Password</label>
                  <input type="password" class="form-control" id="exampleInputPassword1" value="123456">
                </div>
                <button type="submit" class="btn btn-success w-100">Login</button>
                <div class="mb-3 form-check">
                  <input type="checkbox" class="form-check-input" id="exampleCheck1" checked >
                  <label class="form-check-label" for="exampleCheck1">Remember Me</label>
                </div>
               
              </form>
        </div>
        <div class="modal-footer d-flex justify-content-between">
          <button type="button" class="btn btn-danger d-inline-block" data-bs-dismiss="modal">Cancel</button>
          <!-- <button type="button" class="btn btn-secondary">Understood</button> -->
           <div>
            <span>Forgot <a href="#">password</a></span>
           </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
